name: Gitleaks Security Scan

on:
  pull_request:
    branches: [main, develop] # On protège les deux branches vitales
  push:
    branches: [main, develop]

permissions:
  contents: read    

jobs:
  scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # C'est ici que GitHub va chercher ta clé
