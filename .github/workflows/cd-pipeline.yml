name: CD Pipeline Test

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Étape 1 : Scans de sécurité
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.21.2_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Gitleaks - Scan secrets
        run: ./gitleaks detect --source . --verbose --redact

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep - SAST Scan
        run: |
          semgrep scan \
            --config auto \
            --config p/react \
            --config p/javascript \
            --config p/typescript \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --error

      - name: Install dependencies
        run: npm ci
        working-directory: ./renomatch

      - name: npm audit - Dependency Scan
        run: npm audit --audit-level=high
        working-directory: ./renomatch

  # Étape 2 : Build de test (simule le déploiement)
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: security-checks
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./renomatch

      - name: Build frontend
        run: npm run build
        working-directory: ./renomatch

      - name: Build Docker image
        run: docker build -t renomatch ./renomatch

      - name: Pipeline CD validée
        run: echo "✅ Tous les scans sont passés et le build est réussi. Prêt pour le déploiement."
